<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<meta name="theme-color"
content="#17375E">

<title>

KRISHNA CERAMICS STORE

</title>

<meta
name="description"
content="Professional Invoice PDF Generator">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<!-- ===========================
HEADER
=========================== -->

<header class="header">

<div class="header-left">

<div class="logo">

LOGO

</div>

<div class="company">

<h1>

KRISHNA CERAMICS STORE

</h1>

<p>

Professional Invoice PDF Generator

</p>

</div>

</div>

</header>

<!-- ===========================
HOME SCREEN
=========================== -->

<main
id="homeScreen">

<section
class="welcome-card">

<h2>

Welcome Krishna 👋

</h2>

<p>

Create Professional GST Invoice PDF
Using Your Master Database

</p>

</section>

<section
class="menu-grid">

<button
id="newInvoice">

📄

<span>

New Invoice

</span>

</button>

<button
id="partyMaster">

👥

<span>

Party Master

</span>

</button>

<button
id="productMaster">

📦

<span>

Product Master

</span>

</button>

<button
id="transportMaster">

🚚

<span>

Transport Master

</span>

</button>

</section>

<section
class="database-box">

<h3>

Master Database

</h3>

<p>

Select Your Excel Database

</p>

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

</section>

</main>

<!-- ===========================
INVOICE SCREEN
PART 2
=========================== -->

<main
id="invoiceScreen"
style="display:none;">

<section class="invoice-page">

<div class="invoice-title">

<h2>

Sales Invoice

</h2>

<p>

Professional GST Tax Invoice

</p>

</div>

<div class="invoice-box">

<div class="form-row">

<div class="form-group">

<label>

Invoice No.

</label>

<input
type="text"
id="invoiceNo"
readonly>

</div>

<div class="form-group">

<label>

Invoice Date

</label>

<input
type="date"
id="invoiceDate">

</div>

</div>

<div class="form-group">

<label>

Party Name

</label>

<select
id="partySelect">

<option value="">

Select Party

</option>

</select>

</div>

<div class="form-group">

<label>

Transport

</label>

<select
id="transportSelect">

<option value="">

Select Transport

</option>

</select>

</div>

</div>

</section>

</main>

<footer>

© 2026

KRISHNA CERAMICS STORE

</footer>

</div>

<script src="libraries/xlsx.full.min.js"></script>

<script src="app.js"></script>

</body>

</html>
